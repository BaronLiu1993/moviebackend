name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Write .env file on droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /opt/moviebackend
            cat > /opt/moviebackend/.env << 'ENVEOF'
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE=${{ secrets.SUPABASE_SERVICE_ROLE }}
            SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
            SUPABASE_JWT_ALGORITHM=${{ secrets.SUPABASE_JWT_ALGORITHM }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
            TMDB_API_BASE=${{ secrets.TMDB_API_BASE }}
            CRON_ADMIN_TOKEN=${{ secrets.CRON_ADMIN_TOKEN }}
            CLICKHOUSE_USER=${{ secrets.CLICKHOUSE_USER }}
            CLICKHOUSE_PASSWORD=${{ secrets.CLICKHOUSE_PASSWORD }}
            CLICKHOUSE_DATABASE=${{ secrets.CLICKHOUSE_DATABASE }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            APP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ENVEOF
            chmod 600 /opt/moviebackend/.env

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REGISTRY,IMAGE_NAME
          script: |
            export APP_IMAGE="${REGISTRY}/${IMAGE_NAME}:latest"

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /opt/moviebackend
            bash deploy.sh
