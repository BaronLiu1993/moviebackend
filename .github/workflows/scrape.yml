name: Weekly Film Scrape

on:
  schedule:
    - cron: "0 3 * * 0" # Sunday 3 AM UTC
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  trigger-scrape:
    name: Trigger Scrape Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Call scrape endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.API_BASE_URL }}/v1/api/admin/scrape" \
            -H "x-cron-admin-token: ${{ secrets.CRON_ADMIN_TOKEN }}" \
            -H "Content-Type: application/json")

          echo "Response status: $response"

          if [ "$response" != "202" ]; then
            echo "::error::Scrape endpoint returned $response (expected 202)"
            exit 1
          fi
